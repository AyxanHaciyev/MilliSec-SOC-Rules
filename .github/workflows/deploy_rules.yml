name: Deploy Splunk Rules
on:
  push:
    paths:
      - 'rule/*.conf'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to Splunk
        run: |
          for file in rule/*.conf; do
            rule_name=$(basename "$file" .conf)
            echo "Deploying: $rule_name"
            # Biz burada mütləq -k (insecure) və şifrəni secret-dən istifadə edirik
            curl -k -s -u admin:"${{ secrets.SPLUNK_PASSWORD }}" \
              "${{ secrets.SPLUNK_HOST }}/servicesNS/admin/search/saved/searches" \
              -d name="$rule_name" \
              --data-urlencode search="$(cat "$file")" \
              -d "is_visible=1" \
              -d "disabled=0" \
              -d "sharing=app" \
              -o /dev/null -w "Status: %{http_code}\n"
          done
