name: Deploy Splunk Rules
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Push Rules to Splunk API
        run: |
          for file in rules/*.conf; do
            echo "Deploying $file..."
            curl -k -u admin:${{ secrets.SPLUNK_TOKEN }} \
                 "${{ secrets.SPLUNK_HOST }}/services/saved/searches" \
                 -d name="$(basename $file .conf)" \
                 --data-urlencode search="$(cat $file)" \
                 -d "is_visible=1" \
                 -d "disabled=0"
          done
