name: Deploy Splunk Rules

on:
  push:
    branches:
      - main
    paths:
      - 'rule/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Push Rules to Splunk API
        run: |
          for file in rule/*.conf; do
            rule_name=$(basename "$file" .conf)
            echo "--- Deploying: $rule_name ---"
            
            # 1. Qaydanın Splunk-da olub-olmadığını yoxlayırıq (Bearer Token ilə)
            # Biz bura --fail-with-body əlavə edirik ki, xəta olsa GitHub 'fail' versin.
            
            HTTP_STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.SPLUNK_HOST }}/servicesNS/admin/search/saved/searches/$rule_name" \
              -H "Authorization: Bearer ${{ secrets.SPLUNK_TOKEN }}")

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Qayda mövcuddur. Yenilənir (Update)..."
              curl -k -X POST "${{ secrets.SPLUNK_HOST }}/servicesNS/admin/search/saved/searches/$rule_name" \
                   -H "Authorization: Bearer ${{ secrets.SPLUNK_TOKEN }}" \
                   --data-urlencode search="$(cat "$file")" \
                   --fail-with-body
            else
              echo "Qayda yoxdur. Sıfırdan yaradılır (Create)..."
              curl -k -X POST "${{ secrets.SPLUNK_HOST }}/servicesNS/admin/search/saved/searches" \
                   -H "Authorization: Bearer ${{ secrets.SPLUNK_TOKEN }}" \
                   -d name="$rule_name" \
                   --data-urlencode search="$(cat "$file")" \
                   -d "is_visible=1" \
                   -d "disabled=0" \
                   -d "sharing=global" \
                   --fail-with-body
            fi
            
            echo -e "\n--- Done with $rule_name ---\n"
          done
