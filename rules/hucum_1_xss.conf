index=main sourcetype=access_combined 
| rename uri as request_uri 
| where (
    match(request_uri, "(?i)(<script|<\/script|%3Cscript|javascript:|javas&#99;ript|data:text\/html|<svg|<img|<iframe|<object|<details|<marquee|<embed|<isindex)") OR 
    match(request_uri, "(?i)(alert\(|alert`|confirm\(|confirm`|prompt\(|prompt`|eval\(|atob\(|Function\(|\$eval|String\.fromCharCode|base64,PHNjcmlwdD)") OR 
    match(request_uri, "(?i)(\[\]\[.+\]\[.+\]|\!\!\[\]|\!\[\]|\[\]|\$\{.*\$\{.*\}\}|\+\+|--|<<|>>|\^|\|)") OR 
    match(request_uri, "(?i)(\.constructor|\.prototype|__proto__|orderBy:|\.assign|toString|getOwnPropertyDescriptor|getPrototypeOf|\$on\.constructor|\\{\\{)") OR 
    match(request_uri, "(?i)(?:%0a|%0d|%09|%20|\\s|\\/)(?:on(?:error|load|focus|blur|mouseover|pointerover|toggle|start|click|mouseenter|dblclick))\\s*=") OR 
    match(request_uri, "\\\\u[0-9a-fA-F]{4}") OR
    match(useragent, "(?i)(<script|javascript:|alert\()")
)
| stats count by _time, clientip, request_uri, useragent 
| rename clientip as "Attacker_IP", request_uri as "XSS_Vector", useragent as "Suspect_UserAgent"
