title: "XSS Mega-Detection: God Mode, JSFuck & Sandbox Escape"
id: 12345678-1234-1234-1234-123456789999
status: stable
description: |
    Bu qayda indiyə qədər müzakirə etdiyimiz bütün XSS hücumlarını (JSFuck, 
    AngularJS Sandbox Escape, Base64 obfuskasiyası, Polyglot vektorlar, 
    Akamai bypass və s.) tək bir YAML daxilində birləşdirir.
logsource:
    category: webserver,WAF
    index: 
        - veb_server
        - waf
detection:
    # 1. Klassik HTML Tag-ları və URI Scripting
    html_tags:
        uri|contains:
            - '<script'
            - '</script'
            - '%3Cscript'
            - 'javascript:'
            - 'javas&#99;ript'
            - 'data:text/html'
            - '<svg'
            - '<img'
            - '<iframe'
            - '<object'
            - '<details'
            - '<marquee'
            - '<embed'
            - '<isindex'

    # 2. JS Funksiyaları və Obfuskasiya Metodları
    js_functions:
        uri|contains:
            - 'alert('
            - 'alert`'
            - 'confirm('
            - 'confirm`'
            - 'prompt('
            - 'prompt`'
            - 'eval('
            - 'atob('
            - 'Function('
            - '$eval'
            - 'String.fromCharCode'
            - '\u006d'   # Unicode bypass (confir\u006d)
            - 'base64,PHNjcmlwdD' # Base64 <script>

    # 3. JSFuck və Simvol əsaslı Obfuskasiya (Heavy Obfuscation)
    jsfuck_and_symbols:
        uri|re:
            - '\[\]\[.+\]\[.+\]'          # [][...][...] JSFuck strukturu
            - '(?:\!\!\[\]|\!\[\]|\[\])' # JSFuck-un təməl daşları: !![], ![], []
            - '\$\{.*\$\{.*\}\}'          # İç-içə Template Literals
            - '(?:\+\+|--|<<|>>|\^|\|)'  # Bitwise və artırma simvolları (obfuskasiyada çox işlənir)

    # 4. AngularJS və Sandbox Escape (Sənin siyahındakı mürəkkəb stringlər)
    sandbox_escape:
        uri|contains:
            - '.constructor'
            - '.prototype'
            - '__proto__'
            - 'orderBy:'
            - '.assign'
            - 'toString'
            - 'getOwnPropertyDescriptor'
            - 'getPrototypeOf'
            - '$on.constructor'
            - '{{'

    # 5. Dinamik Event Handler-lər və Boşluq Bypass-ları (Regex)
    event_handlers:
        uri|re:
            # On-eventlər qarşısında boşluq, tab, yeni sətir və ya slash olan halları tutur
            - '(?i)(?:%0a|%0d|%09|%20|\s|\/)(?:on(?:error|load|focus|blur|mouseover|pointerover|toggle|start|click|mouseenter|dblclick))\s*='
            # Akamai/JS bypass: .replace.call`
            - '(?i)\.replace\.(?:call|apply)`'
            # Dangling markup və qeyri-standart yükləmələr
            - '(?i)\/\/onload\s*='

    # 6. User-Agent üzərindən gələn XSS
    user_agent_xss:
        useragent|contains:
            - '<script'
            - 'javascript:'
            - 'alert('

    condition: html_tags or js_functions or jsfuck_and_symbols or sandbox_escape or event_handlers or user_agent_xss

fields:
    - src_ip
    - uri
    - useragent
    - status
    - method
falsepositives:
    - Təhlükəsizlik skanerləri.
    - JavaScript mühərriki ilə işləyən daxili sistemlərin (məsələn: monitoring) bəzi mürəkkəb sorğuları.
level: critical
