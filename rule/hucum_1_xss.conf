index=main 
| where (
    match(_raw, "(?i)(<script|<\/script|%3Cscript|javascript:|javas&#99;ript|data:text\/html|<svg|<img|<iframe|<object|<details|<marquee|<embed|<isindex)") OR 
    match(_raw, "(?i)(alert\(|alert`|confirm\(|confirm`|prompt\(|prompt`|eval\(|atob\(|Function\(|\$eval|String\.fromCharCode|base64,PHNjcmlwdD)") OR 
    match(_raw, "(?i)(\[\]\[.+\]\[.+\]|\!\!\[\]|\!\[\]|\[\]|\$\{.*\$\{.*\}\}|\+\+|--|<<|>>|\^|\|)") OR 
    match(_raw, "(?i)(\.constructor|\.prototype|__proto__|orderBy:|\.assign|toString|getOwnPropertyDescriptor|getPrototypeOf|\$on\.constructor|\\{\\{)") OR 
    match(_raw, "(?i)(?:%0a|%0d|%09|%20|\\s|\\/)(?:on(?:error|load|focus|blur|mouseover|pointerover|toggle|start|click|mouseenter|dblclick))\\s*=") OR 
    match(_raw, "\\\\u[0-9a-fA-F]{4}")
)
