(index="waf" OR index="main" OR index="web_server")
| rex field=_raw "(?<src_ip>\d{1,3}(\.\d{1,3}){3})"
| rex field=_raw "(?i)(?<xss_payload>(<script.*?>.*?</script>|javascript:[^\\s\"']+|onerror=[^\\s\"']+|onload=[^\\s\"']+|alert\\([^)]*\\)|%3cscript.*?%3e|<svg[^>]*>|<img[^>]*>))"
| eval is_xss=if(isnotnull(xss_payload),1,0)
| where is_xss=1
| eval risk_score=case(
    match(xss_payload,"(?i)<script"),10,
    match(xss_payload,"(?i)javascript:"),8,
    match(xss_payload,"(?i)onerror|onload"),7,
    match(xss_payload,"(?i)alert"),6,
    match(xss_payload,"(?i)%3cscript"),9,
    match(xss_payload,"(?i)<svg|<img"),5,
    true(),3
)
| bin _time span=1m
| stats 
    count as attack_count 
    values(xss_payload) as payloads 
    max(risk_score) as max_risk 
  by _time src_ip
| sort - max_risk attack_count
